# Databricks Asset Bundle Configuration
# This file defines the deployment configuration for Databricks resources

bundle:
  name: fan-churn-analysis
  
  # Databricks workspace configuration
  compute_id: ${var.cluster_id}
  
  # Git integration
  git:
    branch: main
    origin_url: https://github.com/YOUR_USERNAME/fan-churn-analysis.git

# Variables for different environments
variables:
  # Development environment
  dev:
    catalog: dev_fan_analytics
    schema: fan_churn
    cluster_id: ${var.dev_cluster_id}
    
  # Production environment  
  prod:
    catalog: prod_fan_analytics
    schema: fan_churn
    cluster_id: ${var.prod_cluster_id}

# Workspace paths
workspace:
  root_path: /Workspace/Repos/fan-churn-analysis
  
  # File paths
  file_path: /Workspace/Repos/fan-churn-analysis/src
  artifact_path: /Workspace/Repos/fan-churn-analysis/artifacts

# Target environments
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.databricks_host}
      
  prod:
    mode: production
    workspace:
      host: ${var.databricks_host}
      
# Resources to deploy
resources:
  # Databricks Jobs
  jobs:
    fan_churn_etl:
      name: "Fan Churn ETL Pipeline - ${bundle.target}"
      
      # Job clusters
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.databricks.delta.preview.enabled: "true"
            
      # Tasks
      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingestion
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./notebooks/02_silver_transformation
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              
        - task_key: gold_kpis
          depends_on:
            - task_key: silver_transformation
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./notebooks/03_gold_kpis
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              
      # Schedule (daily at 2 AM UTC)
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
        
      # Email notifications
      email_notifications:
        on_failure:
          - your.email@example.com
        on_success:
          - your.email@example.com
          
      # Timeout and retries
      timeout_seconds: 7200
      max_concurrent_runs: 1
      
  # Delta Live Tables Pipeline (alternative to Jobs)
  pipelines:
    fan_churn_dlt:
      name: "Fan Churn DLT Pipeline - ${bundle.target}"
      catalog: ${var.catalog}
      target: ${var.schema}
      
      configuration:
        spark.sql.shuffle.partitions: "auto"
        
      clusters:
        - label: default
          num_workers: 2
          
      libraries:
        - notebook:
            path: ./pipelines/dlt_pipeline.py
            
      channel: CURRENT
      edition: ADVANCED
      photon: true
      continuous: false
